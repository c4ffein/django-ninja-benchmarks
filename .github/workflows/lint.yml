name: lint

# Fast, Docker-free gate: ruff lint + format check. Config (rules, line-length,
# per-file ignores) lives in pyproject.toml; the version here is pinned to match.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Ruff lint
        run: uvx ruff@0.14.4 check --output-format=github .

      - name: Ruff format check
        run: uvx ruff@0.14.4 format --check .
