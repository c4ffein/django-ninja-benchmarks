# Modernized: one self-contained image; cli.py runs the servers + load gen inside it.
# (The original per-framework services existed for the 2020 run_test.py + host-side `ab`
#  orchestration; that flow is superseded by cli.py/tools_bench.py and kept only in git history.)
#
#   docker compose build
#   docker compose run --rm bench cli.py bench server-matrix
#   docker compose run --rm bench cli.py bench route-matrix
#   docker compose run --rm bench cli.py microbench ninja
services:
  bench:
    build: .
    volumes:
      - ./ci-out:/out
    command: ["cli.py", "bench", "server-matrix", "--output-dir", "/out"]
